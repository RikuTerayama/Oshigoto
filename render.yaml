services:
  - type: web
    name: oshigoto
    env: docker
    plan: free
    buildCommand: docker build -t oshigoto .
    startCommand: docker run -p $PORT:$PORT oshigoto
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
      - key: BASE_URL
        value: https://oshigoto.onrender.com
      - key: ADSENSE_ENABLED
        value: true
      - key: AMAZON_AFFILIATE_ENABLED
        value: true
      - key: AMAZON_ASSOCIATE_TAG
        value: jobcanauto-22
      - key: WEB_CONCURRENCY
        value: "1"
      - key: WEB_THREADS
        value: "1"
      - key: WEB_TIMEOUT
        value: "180"
      - key: WEB_GRACEFUL_TIMEOUT
        value: "30"
      - key: WEB_KEEPALIVE
        value: "5"
      - key: WEB_MAX_REQUESTS
        value: "500"
      - key: WEB_MAX_REQUESTS_JITTER
        value: "50"
      - key: WEB_LOG_LEVEL
        value: warning
      - key: MEMORY_LIMIT_MB
        value: "450"
      - key: MEMORY_WARNING_MB
        value: "400"
      - key: MAX_FILE_SIZE_MB
        value: "10"
